name: Docker CI (Multi-Arch)

env:
  IMAGE_NAME: myapp-net

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET SDK (validasi & tooling)
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Clean build artifacts (🔥 FIX DUPLICATE CLASS)
      - name: Clean .NET build artifacts
        run: |
          dotnet clean
          rm -rf bin obj

      # 4️⃣ Setup QEMU (WAJIB untuk multi-arch)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 5️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6️⃣ Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7️⃣ Generate metadata & tags image
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=tag
            type=raw,value=latest

      # 8️⃣ Build & Push Docker image (Multi-Arch)
      - name: Build & Push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
